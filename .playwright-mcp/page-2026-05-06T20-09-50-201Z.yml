        - generic [ref=e260]:
          - generic [ref=e261] [cursor=pointer]:
            - button "How much does it cost to build a website?" [expanded] [ref=e262]:
              - generic [ref=e264]: How much does it cost to build a website?
            - region "How much does it cost to build a website?" [ref=e266]:
              - paragraph [ref=e268]: The cost of a website varies depending on the purpose and scope of the project. Whether it's a corporate site, brand site, e-commerce platform, or responsive web, the design and development requirements will differ. We can customize the structure to fit your budget, and we provide accurate, reasonable estimates after a consultation.
          - generic [ref=e269] [cursor=pointer]:
            - button "How long does the website production take?" [ref=e270]:
              - generic [ref=e272]: How long does the website production take?
            - region "How long does the website production take?":
              - paragraph: Typically, production takes between 6 to 12 weeks. The schedule may vary based on the number of pages, complexity of features (such as login, booking, shopping cart), and level of design customization. We work closely with you during planning to ensure smooth project management and timely delivery.
          - generic [ref=e275] [cursor=pointer]:
            - button "Do you create custom designs or use templates?" [ref=e276]:
              - generic [ref=e278]: Do you create custom designs or use templates?
            - region "Do you create custom designs or use templates?":
              - paragraph: We offer both custom-designed websites and template-based builds. If strong brand identity is important, we recommend a fully customized design for a unique look and feel. For faster turnaround or cost efficiency, our premium templates can also deliver high-quality, professional results.
          - generic [ref=e281] [cursor=pointer]:
            - button "Will the website be mobile-friendly?" [ref=e282]:
              - generic [ref=e284]: Will the website be mobile-friendly?
            - region "Will the website be mobile-friendly?":
              - paragraph: Absolutely. All our websites are responsive by default, optimized for mobile, tablet, and desktop devices. Given that mobile traffic now dominates, we place special emphasis on clean, intuitive mobile UX to ensure seamless usability across all screen sizes.
          - generic [ref=e287] [cursor=pointer]:
            - button "Do you provide hosting and domain services?" [ref=e288]:
              - generic [ref=e290]: Do you provide hosting and domain services?
            - region "Do you provide hosting and domain services?":
              - paragraph: We offer free hosting for the first year. After that, renewal is available as a paid service. For domains, we recommend purchasing under your own name for ownership protection, but if needed, we can assist with domain registration and setup. If you already own a domain, we can migrate it to our hosting environment for you.
