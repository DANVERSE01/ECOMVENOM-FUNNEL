  - dialog "WACUS Cookie Policy" [ref=e33]:
    - generic [ref=e34]:
      - heading "WACUS Cookie Policy" [level=2] [ref=e35]
      - button "Close" [ref=e36] [cursor=pointer]: ×
    - generic [ref=e37]:
      - generic [ref=e38]: 1. Introduction
      - paragraph [ref=e39]: WACUS (hereinafter referred to as the "Company") uses cookies and similar technologies to enhance your browsing experience, analyze traffic, and provide personalized content and advertisements. This Cookie Policy explains what cookies are and how we use them.
      - generic [ref=e40]: 2. What are Cookies?
      - paragraph [ref=e41]: Cookies are small text files stored on your device when you visit a website. They help the website recognize your device and remember your preferences.
      - generic [ref=e42]: 3. Types of Cookies We Use
      - list [ref=e43]:
        - listitem [ref=e44]:
          - strong [ref=e45]: "Essential Cookies:"
          - text: These are necessary for the website to function and cannot be disabled.
        - listitem [ref=e46]:
          - strong [ref=e47]: "Analytics Cookies:"
          - text: These are used to understand user behavior and improve our services (e.g., Google Analytics).
      - generic [ref=e48]: 4. How We Use Cookies
      - paragraph [ref=e49]: "We use cookies for various purposes, including:"
      - list [ref=e50]:
        - listitem [ref=e51]: To remember your preferences and settings
        - listitem [ref=e52]: To analyze website traffic and user behavior
        - listitem [ref=e53]: To provide personalized content and advertisements
        - listitem [ref=e54]: To improve website functionality and user experience
        - listitem [ref=e55]: To ensure website security and prevent fraud
      - generic [ref=e56]: 5. Third-Party Cookies
      - paragraph [ref=e57]: In addition to our own cookies, we may also use various third-party cookies to report usage statistics of the website, deliver advertisements on and through the website, and so on. These third-party cookies are subject to their respective privacy policies.
      - generic [ref=e58]: 6. Managing Cookies
      - paragraph [ref=e59]: You can control and manage cookies in various ways. Please keep in mind that removing or blocking cookies can impact your user experience and parts of our website may no longer be fully accessible. Most browsers automatically accept cookies, but you can modify your browser settings to decline cookies if you prefer.
      - generic [ref=e60]: 7. Changes to This Policy
      - paragraph [ref=e61]: We may update this Cookie Policy from time to time to reflect changes in our practices or for other operational, legal, or regulatory reasons. Please revisit this Cookie Policy regularly to stay informed about our use of cookies and related technologies.
      - generic [ref=e62]: 8. Contact Us
      - paragraph [ref=e63]: If you have any questions about our use of cookies or other technologies, please contact us through our contact page or email us at privacy@wacus.com.
